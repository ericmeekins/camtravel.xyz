<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>博客归档 - CamTravel</title>
    <style>
        body { font-family: sans-serif; line-height: 1.6; max-width: 800px; margin: 40px auto; padding: 0 20px; }
        ul { list-style: none; padding: 0; }
        li { margin-bottom: 10px; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        a { text-decoration: none; color: #333; }
        a:hover { color: #007bff; }
    </style>
</head>
<body>
    <h1>全部文章归档</h1>
    <ul id="post-list"></ul>
    <script>
        // 这一块就是你的“文章控制台”，以后直接往这里加行即可
        const posts = [
            { title: "Cambodian Pchum Ben Day", url: "/cambodian-pchum-ben-day" },
            { title: "Exploring Street Food in Cambodia", url: "/exploring-street-food-in-cambodia" },
            { title: "The Mouse Hunting Adventure Along the Coast of Tonle Sap Lake During the Rainy Season", url: "/tonle-sap-lake-rural-life-cambodia" },
            { title: "Wild fish fishing", url: "/makak-water-reservoir-cambodia" },
            { title: "The three major telecommunications operators", url: "/the-three-major-telecom-operators-in-cambodia-cellcard-metfone-and-smart-2025-update" },
            { title: "Transportation and Travel: PassApp and Intercity Travel Options in Cambodia", url: "/transportation-and-travel-passapp-and-intercity-travel-options-in-cambodia" },
        ];
        const listContainer = document.getElementById('post-list');
        posts.forEach(post => {
            const li = document.createElement('li');
            li.innerHTML = `<a href="${post.url}">${post.title}</a>`;
            listContainer.appendChild(li);
        });
    </script>
</body>
</html>
